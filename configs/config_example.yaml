Server:
  post: 8080
  Host: "localhost"
  Mode: "debug"

Database:
  Psql:
    host: "127.0.0.1"
    port: 5432
    username: "UserName"
    password: "PassWord"
    database: "DBName"
    max_open_conns: 100  # 最大打开连接数
    max_idle_conns: 20   # 最大空闲连接数
    conn_max_lifetime: 3600 # 连接最大存活时间（秒）
  Redis:
    Host: "localhost"
    Port: 6379
    Password: "123456"
  
# Zap日志配置
log:
  level: "debug"       # 日志级别：debug/info/warn/error
  format: "console"    # 输出格式：console/json
  filename: "./logs/app.log" # 日志文件路径
  max_size: 100        # 单个日志文件大小上限(MB)
  max_backup: 10       # 最大备份文件数
  max_age: 7           # 日志保留天数
  compress: true       # 是否压缩备份日志
  stdout: true         # 是否同时输出到控制台